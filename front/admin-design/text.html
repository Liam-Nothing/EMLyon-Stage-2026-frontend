<body>
  
  <header>
      <img src="../assets/LogoJointInWhite.png" alt="logo" class="logo">

      <div class="btn-align">
          <a href="../index.html" class="btn-forme btn-main" id="public-btn">Page Publique</a>
          <a href="" class="btn-forme btn-second" id="logout-btn">Log-out</a>
      </div>
      <!-- ajouter menu -->
        <div class="menue">
          <i class="fa-solid fa-bars"></i>
      </div>
  </header>

  <main>

    <nav class="navBar">

      <div class="nav-left">
        <a href="../admin/admin.html" class="grey">Liens</a>
        <a href="customize.html">Design</a>
        <a href="../admin/admin_profile.html" class="grey">Profil</a>

      <div class="nav-right">
        <p>Link : <a href="">xxx/xxxxxx.xx </a></p>
        <a href="" class="h"><i class="fa-regular fa-copy"></i></a>
      </div>

    </nav>

    <section id="saveBar">

      <div class="titleNav">

        <div class="leftTitleNav">
          <a href="customize.html"><i class="fa-solid fa-angle-left"></i></a>
          <h2>Texte</h2>
        </div>
        <div class="saveTitleNav">
          <div class="arrows">
            <button id="undoButton" class="undoButton"><i class="fa-solid fa-arrow-rotate-left"></i></button>
            <button id="redoButton" class="redoButton"><i class="fa-solid fa-arrow-rotate-right"></i></button>
          </div>
          <button class="btn-forme button" id="saveBtn">Sauvegarder</button>
        </div>

      </div>
    </section>

    <section id="text">


      <div class="fontFamily" id="fontFamily">

        <h3>Font family :</h3>
        <div class="fontCard">
          <select name="fontFamilySelect" id="fontFamilySelect" class="fontSelect">

            <button>
              <selectedcontent></selectedcontent>
              <i class="fa-solid fa-angle-down"></i>
            </button>

            <option value="Default" class="optionStyle" id="default">Default</option>
            <option value="Noto sans" class="optionStyle" id="notoSans" style="font-family:'Noto Sans'">Noto Sans</option>
            <option value="Roboto" class="optionStyle" id="roboto" style="font-family:'Roboto'">Roboto</option>
            <option value="Sour Gummy" class="optionStyle" id="sourGummy" style="font-family:'Sour Gummy'">Sour Gummy</option>
            <option value="Quintessential" class="optionStyle" id="quintessential" style="font-family:'Quintessential'">Quintessential</option>
            <option value="Saira Stencil" class="optionStyle" id="sairaStencil" style="font-family:'Saira Stencil'">Saira Stencil</option>
            <option value="Playfair Display" class="optionStyle" id="playfairDisplay" style="font-family:'Playfair Display'">Playfair Display</option>
          </select>
        </div>

      </div>



      <div class="textColor" id="textColor">
        <h3>Text color :</h3>
        <div class="colorCard">
          <label for="textColorSelect">
            <span id="circleTextColor" class="circleColor"></span>
          </label>
          <input type="color" name="textColorSelect" id="textColorSelect" value="#000000"> <!-- Have to be hidden -->

          <p id="nameTextColor">#000000</p>
        </div>
      </div>


      <!-- ========================= OPTIONNEL ================================== -->
       <!-- <div class="socials" id="socials">
        <h3>Réseaux sociaux :</h3>
        <div class="styleAlign">

          <p class="sociauBtn" id="downBtn">En bas</p>

        </div>
       </div> -->
      <!-- ====================================================================== -->


    </section>


    <!-- ========== Preview card ================================ -->
        <aside id="backgroundColor">
            <div id="cardPreview" class="cardPreview">

                <div class="alignPreview">
                    
                    <div id="profilPreview" class="profilPreview">
                        <div id="pfpPreview" class="pfpPreview">
                            <img src="../assets/Avatar_defaut.png" alt="profil picture">
                        </div>
                        <h1 id="usernamePreview">@Mikeyy</h1>
                        <p id="bioPreview">Jeune entrepreneur - Voici mes réseaux où vous pouvez me suivre et les liens de mes projets accomplis</p>
                    </div>
    
                    <div id="linkContainerPreview" class="linkContainerPreview">
                        <!-- links that will be add with js -->
                        <div class="linkPreview">
                            <div id="leftPreview" class="leftPreview"> <img src="../assets/cat6.jpg" alt=""> </div>
                            <div id="middlePreview" class="middlePreview"> <a href="" class="myLinkPreview">Youtube</a> </div>
                            <div id="rightPreview" class="rightPreview"></div>
                        </div>
    
                    </div>

                </div>

                <div class="footer" id="footer"><p>- Made with <a href="#" id="stillFooter">JointIn</a> -</p></div>

            </div>
        </aside>
