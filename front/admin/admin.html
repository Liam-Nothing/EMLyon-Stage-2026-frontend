<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">

    <!-- ne pas oublier le favicon -->
    <link rel="shortcut icon" href="../assets/LogoJointInWhite.png" type="image/x-icon">

    <title>JointIn - Liens</title> <!-- a changer -->
</head>
<body>
    <header>
        <img src="../assets/LogoJointInWhite.png" alt="logo" class="logo">

        <div class="btn-align">
            <a href="../index.html" class="btn-forme btn-main" id="public-btn">Page Publique</a>
            <a href="" class="btn-forme btn-second" id="logout-btn">Log-out</a>
        </div>
        <!-- ajouter menu -->
         <div class="menue">
            <i class="fa-solid fa-bars"></i>
        </div>
    </header>

    <main>

        <nav class="navBar">

            <div class="nav-left">
                <a href="">Liens</a>
                <a href="" class="grey">Design</a>
                <a href="admin_profile.html" class="grey">Profil</a>
            </div>

            <div class="nav-right">
                <p>Link : <a href="">xxx/xxxxxx.xx </a></p>
                <a href="" class="hidden"><i class="fa-regular fa-copy"></i></a>
            </div>

        </nav>
        <!-- ================================ Suite du code =================================== -->

        <!-- ============== Ajout lien ====================== -->

        <section id="formulaire">
            <h2>Ajouter un nouveau lien</h2>

            <form class="formCard">
                <div class="formLink">
                    <input type="text" placeholder="Titre du lien">
                </div>

                <div class="formLink">
                    <input type="url" placeholder="https://...">
                </div>
  
                <div class="formLink">
                    <input type="file">
                </div>

                <div class="save-discard-btns">
                    <a href="" class="btn-discard small-btn">Annuler</a>
                    <a href="" class="btn-main small-btn save">Ajouter le lien</a>
                </div>
                
            </form>

        </section>

        <!-- ===================================================== -->



        <!-- ================== Ajout reseau ==================== -->

        <section id="formulaire-reseau">
            <h2>Ajouter un nouveau réseau</h2>

            <form class="formCard">
                <input type="url" placeholder="https://...">

                <button type="submit" class="addLink"> Ajouter un réseau </button>
                
            </form>

        </section>

         <!-- ===================================================== -->

    <!-- RESEAU -->
        <section id="reseau">
            <h2>Mes réseaux sociaux</h2>
            <div class="reseau-align">
                <button class="add-reseau"><i class="fa-solid fa-plus"></i></button>
            </div>
        </section>

    <!-- LIENS -->
        <section id="liens">
            <h2> Mes liens</h2>

            <button class="addLink">
                <i class="fa-solid fa-plus"></i>
                Ajoutez un lien
            </button>

            <div class="linkList">

                <!-- Card 1 -->
                <div class="linkCard">

                    <div class ="drag">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </div>
                    
                    <div class="linkContent">
                        <div class="linkHeader">
                            <strong>Minecraft Vide Youtube</strong>

                            <button class="edit">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                        </div>

                        <div class="url">https://youtube.com</div>

                        <hr>

                        <div class="linkActions">
                            <span class="imageLink">
                                <i class="fa-regular fa-image"></i>
                            </span>

                            <div class="linkActionRight">
                                <button class="delete"> 
                                <i class="fa-solid fa-trash"></i>
                            </button>

                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                            </div>
                            
                            
                            <!-- <div>
                                <input type="checkbox" id="switch">
                                <label for="switch" class="toggle"></label>
                            </div> -->


                        </div>
                    </div>
                </div>


                <!-- Card2 -->
                <div class="linkCard">

                    <div class ="drag">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </div>
                    
                    <div class="linkContent">
                        <div class="linkHeader">
                            <strong>Cat Vide Youtube</strong>

                            <button class="edit">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                        </div>

                        <div class="url">https://youtube.com</div>

                        <hr>

                        <div class="linkActions">
                            <span class="imageLink">
                                <i class="fa-regular fa-image"></i>
                            </span>

                            <div class="linkActionRight">

                                <button class="delete"> 
                                <i class="fa-solid fa-trash"></i>
                            </button>

                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>

                            </div>
                            

                            <!-- <div>
                                <input type="checkbox" id="switch">
                                <label for="switch" class="toggle"></label>
                            </div> -->

                        </div>
                    </div>
                </div>
 
            </div>
        </section>

        <aside id="backgroundColor">
            
        </aside>

    </main>

    <footer>
      <p>- Made with <a href="#">JointIn</a> -</p>
    </footer>


    <script src="admin.js"></script>
    <script src="https://kit.fontawesome.com/c7036cb919.js" crossorigin="anonymous"></script>
</body>
</html>
