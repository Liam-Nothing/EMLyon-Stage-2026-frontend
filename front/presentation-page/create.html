<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="create.css">

  <link rel="shortcut icon" href="../assets/LogoJointInWhite.png" type="image/x-icon">

  <title>JointIn - Créer un compte</title>
</head>
<body>
  
  <header>
    <a href="presentation.html"><img src="../assets/LogoJointInWhite.png" alt="logo" class="logo"></a>
  </header>

  <main>
    <section>
      <div class="contain">

        <form action="" method="post">
          <div class="input">
            <label for="mail">Email :</label>
            <input type="email" name="mail" id="mail" placeholder="example@gmail.com" required>
          </div>

          <div class="input">
            <label for="password">Mot de passe :</label>
            <input type="password" name="password" id="password" required>
          </div>

          <div class="input">
            <label for="confirmPass">Confirmez votre mot de passe :</label>
            <input type="password" name="confirmPass" id="confirmPass" required>
          </div>

          <div class="btns">
            <a href="connect.html">retour</a>
            <input type="submit" value="Suivant">
          </div>
        </form>

      </div>
    </section>
  </main>


  <script src="https://kit.fontawesome.com/c7036cb919.js" crossorigin="anonymous"></script>
  <script src="create.js"></script>
</body>
</html>
