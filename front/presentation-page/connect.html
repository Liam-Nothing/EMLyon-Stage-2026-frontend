<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="connect.css">

  <link rel="shortcut icon" href="../assets/LogoJointInWhite.png" type="image/x-icon">

  <title>JointIn - Connexion</title>
</head>
<body>
  
  <header>
    <a href="presentation.html"><img src="../assets/LogoJointInWhite.png" alt="logo" class="logo"></a>
  </header>

  <main>

    <section id="connect">
      <div class="connect">

        <div class="leftSection">
          <div class="google">
            <i class="fa-brands fa-google"></i>
            <p>Se connecter avec Google</p>
          </div>

          <form action="" method="post">
            <div class="input">
              <label for="username">Email :</label>
              <input type="text" name="username" id="username" placeholder="example@gmail.com" required>
            </div>

            <div class="input">
              <label for="password">Mot de passe :</label>
              <input type="password" name="password" id="password" required>
              <p>Pas de compte ? <a href="create.html" class="create">Cliquer ici</a> pour en créer un !</p>
            </div>

            <div class="submit">
              <input type="submit" value="Se connecter">
            </div>
          </form>
        </div>

        <div class="rightSection">
          <img src="../assets/connectimg.png" alt="connect image">
        </div>

      </div>
    </section>

  </main>


  <script src="https://kit.fontawesome.com/c7036cb919.js" crossorigin="anonymous"></script>
  <script src="connect.js"></script>
</body>
</html>
